name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  build:
    name: Build distributions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write      # for sigstore / attestations
      attestations: write  # for attest-build-provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
        with: { persist-credentials: false }
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - id: version
        run: echo "version=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - run: uv build
      - name: Generate SBOM (SPDX + CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Attest build provenance (SLSA v1)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            dist/
            sbom.spdx.json
            sbom.cdx.json

  # -------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI (OIDC)
    needs: [build]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/hetzner-ddns
    permissions:
      id-token: write       # trusted publishing
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: artifacts
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist
          attestations: true

  # -------------------------------------------------------------------------
  publish-container:
    name: Publish container image (GHCR, signed)
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
        with: { persist-credentials: false }
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/hetznerddnspy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=sha,format=long
      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          for t in $TAGS; do
            cosign sign --yes "${t}@${DIGEST}"
          done
      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/hetznerddnspy
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          sbom-path: sbom.cdx.json

  # -------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: [build, publish-pypi, publish-container]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@v2
        with: { egress-policy: audit }
      - uses: actions/checkout@v6
        with: { persist-credentials: false }
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/dist/*
            artifacts/sbom.spdx.json
            artifacts/sbom.cdx.json
