name: Bug report
description: Something is not working as expected.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: hetzner-ddns version
      placeholder: "2.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / kernel
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (`journalctl -u hetzner_ddns.service`)
      render: shell
  - type: checkboxes
    id: pre
    attributes:
      label: Pre-flight
      options:
        - label: I redacted any API tokens, IP addresses, or other secrets.
          required: true
