version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns: ["ruff", "mypy", "pytest*", "pre-commit"]
      security-tools:
        patterns: ["bandit", "pip-audit", "semgrep"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      gh-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
